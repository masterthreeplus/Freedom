name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autoconf automake pkg-config libssl-dev scons libncurses5-dev libncursesw5-dev zlib1g-dev openjdk-17-jdk unzip zip

      - name: Install Python Dependencies
        run: |
          pip install --upgrade Cython==0.29.33 buildozer virtualenv

      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: PremiumPass-APK
          path: bin/*.apk
          
