name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autoconf automake pkg-config libssl-dev scons libncurses5-dev libncursesw5-dev zlib1g-dev unzip zip libffi-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython==0.29.33 buildozer virtualenv

      - name: Build APK
        run: |
          # Buildozer ကို refresh လုပ်ပြီး အသစ်ကနေ စခိုင်းမယ်
          rm -rf .buildozer
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PremiumPass-APK
          path: bin/*.apk

